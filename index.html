<body>
    <!-- 入力画面 -->
    <div id="inputScreen">
        <div class="honba-bar" style="padding: 10px 8px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <button class="honba-btn" onclick="changeKyoku(-1)">◀</button>
                <span class="honba-label" id="kyokuLabel" style="font-size: 16px; font-weight: bold;">東1局</span>
                <button class="honba-btn" onclick="changeKyoku(1)">▶</button>
                <span style="color:rgba(255,255,255,0.4);margin:0 8px;">|</span>
                <button class="honba-btn" onclick="changeHonba(-1)">－</button>
                <span class="honba-count" id="honbaCount" style="font-size: 16px; font-weight: bold;">0</span>
                <span class="honba-label" style="font-size: 14px;">本場</span>
                <button class="honba-btn" onclick="changeHonba(1)">＋</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="honba-btn" onclick="showHistoryScreen()" style="font-size: 18px;">📊</button>
                <button class="honba-btn" onclick="showScoreScreen()" style="font-size: 18px;">💰</button>
            </div>
        </div>

        <div class="players-grid" id="playersGrid">
            <!-- プレイヤーカードがJavaScriptで生成される -->
        </div>

        <div class="control-panel">
            <button class="btn-save" onclick="openAgariModalCommon()" style="background: #E91E63;">🎉 和了</button>
            <button class="btn-save" onclick="saveData()">💾 記録を保存</button>
        </div>
    </div>
    
    <!-- 点数管理画面 -->
    <div id="scoreScreen" style="display: none; flex-direction: column; height: 100dvh; padding: 0;">
        <div class="history-content" id="scoreContent" style="overflow-x: auto; flex: 1; padding: 10px;">
            <!-- 点数管理がここに表示される -->
        </div>
        <div class="control-panel" style="flex-shrink: 0;">
            <button class="btn-back" onclick="showInputScreen()">← 入力画面に戻る</button>
        </div>
    </div>

    <!-- 記録確認画面 -->
    <div id="historyScreen" style="display: none;">
        <div class="header">
            <h1>📊 対戦履歴</h1>
        </div>
        <div class="history-content" id="historyContent">
            <!-- 履歴がここに表示される -->
        </div>
        <div class="control-panel">
            <button class="btn-back" onclick="showInputScreen()">← 入力画面に戻る</button>
        </div>
    </div>
    
    <!-- ランキング画面 -->
    <div id="rankingScreen" style="display: none; flex-direction: column; height: 100dvh; padding: 0;">
        <div class="history-content" id="rankingContent" style="overflow-x: auto; flex: 1; padding: 10px;">
            <!-- ランキングがここに表示される -->
        </div>
        <div class="control-panel" style="flex-shrink: 0;">
            <button class="btn-back" onclick="showHistoryScreen()">← 履歴画面に戻る</button>
        </div>
    </div>
    
    <!-- 和了記録モーダル -->
    <div id="agariModal" class="agari-modal">
        <div class="agari-modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🎉 和了記録</h2>
                <span class="close" onclick="closeAgariModal()">&times;</span>
            </div>
            
            <form id="agariForm">
                <div class="form-group">
                    <label class="form-label">和了プレイヤー</label>
                    <select id="agariPlayer" class="select-input" required>
                        <!-- JavaScriptで動的生成 -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">和了方法</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="agariType" value="tsumo" checked>
                            <span>ツモ</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="agariType" value="ron">
                            <span>ロン</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-group" id="ronFromGroup" style="display:none;">
                    <label class="form-label">誰から？</label>
                    <select id="ronFrom" class="select-input">
                        <!-- JavaScriptで動的生成 -->
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">一発</label>
                    <label class="ippatsu-group" id="ippatsuLabel">
                        <input type="checkbox" id="ippatsuCheck" onchange="updateIppatsuStyle()">
                        <span>⚡ 一発和了</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label class="form-label">得点（点）</label>
                    <input type="number" id="agariPoints" class="form-input" placeholder="例: 8000" required min="0" step="100" inputmode="numeric" pattern="[0-9]*">
                </div>
                
                <button type="submit" class="btn-submit">✓ 記録する</button>
                <button type="button" class="btn-cancel" onclick="closeAgariModal()">キャンセル</button>
            </form>
        </div>
    </div>

    <script>
        // プレイヤーデータの初期化
        const positions = ['東家', '南家', '西家', '北家'];
        let players = [];
        let currentAgariPlayer = null;
        let honba = 0;
        let kyoku = 0;

        const kyokuLabels = [
            '東1局','東2局','東3局','東4局',
            '南1局','南2局','南3局','南4局'
        ];

        function changeKyoku(delta) {
            kyoku = (kyoku + delta + kyokuLabels.length) % kyokuLabels.length;
            if (kyoku < 0) kyoku = 0;
            document.getElementById('kyokuLabel').textContent = kyokuLabels[kyoku];
        }

        // 本場数変更
        function changeHonba(delta) {
            honba = Math.max(0, honba + delta);
            document.getElementById('honbaCount').textContent = honba;
        }
        
        // 一発チェックボックスのスタイル更新
        function updateIppatsuStyle() {
            const cb = document.getElementById('ippatsuCheck');
            const label = document.getElementById('ippatsuLabel');
            if (cb.checked) {
                label.classList.add('checked');
            } else {
                label.classList.remove('checked');
            }
        }
        
        // 名前をLocalStorageに保存
        function savePlayerNames() {
            const names = players.map(p => p.name);
            localStorage.setItem('mahjongPlayerNames', JSON.stringify(names));
        }
        
        // 初期化
        function initPlayers() {
            const savedNames = JSON.parse(localStorage.getItem('mahjongPlayerNames') || 'null');
            
            players = positions.map((pos, index) => ({
                id: index,
                position: pos,
                name: savedNames ? savedNames[index] : pos,
                furo: 0,
                reach: 0,
                agari: 0,
                houjuu: 0,
                isOya: index === 0,  // 東家が初期親
                agariDetails: [],
                totalPoints: 0,
                tsumoCount: 0,
                ronCount: 0,
                totalHoujuu: 0
            }));
            renderPlayers();
        }
        
        // 親を切り替え
        function toggleOya(playerId) {
            players.forEach(p => p.isOya = false);
            players[playerId].isOya = true;
            renderPlayers();
        }
        
        // 家を変更
        function changePosition(playerId, newPosition) {
            players[playerId].position = newPosition;
            renderPlayers();
        }
        
        // プレイヤーカードのレンダリング
        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            
            players.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                const reachDisabled = player.furo > 0;
                card.innerHTML = `
                    <div class="player-header">
                        <div class="player-name" onclick="editPlayerName(${player.id})" id="playerName${player.id}">${player.name}</div>
                    </div>
                    
                    <div style="display: flex; gap: 6px; margin-bottom: 6px;">
                        <select class="player-position-select" onchange="changePosition(${player.id}, this.value)" style="flex: 1; height: 50px; padding: 0 4px; font-size: 13px; font-weight: bold; border: 2px solid #4CAF50; border-radius: 6px; background: white; color: #4CAF50; -webkit-appearance: none; appearance: none; text-align: center;">
                            <option value="東家" ${player.position === '東家' ? 'selected' : ''}>東家</option>
                            <option value="南家" ${player.position === '南家' ? 'selected' : ''}>南家</option>
                            <option value="西家" ${player.position === '西家' ? 'selected' : ''}>西家</option>
                            <option value="北家" ${player.position === '北家' ? 'selected' : ''}>北家</option>
                        </select>
                        <button onclick="toggleOya(${player.id})" style="flex: 1; height: 50px; padding: 0; font-size: 14px; font-weight: bold; border: 2px solid ${player.isOya ? '#FF5722' : '#ddd'}; border-radius: 6px; background: ${player.isOya ? '#FF5722' : '#f8f8f8'}; color: ${player.isOya ? 'white' : '#aaa'}; ${player.isOya ? 'box-shadow: 0 0 8px rgba(255, 87, 34, 0.6);' : ''} cursor: pointer; -webkit-appearance: none; appearance: none;">
                            ${player.isOya ? '✓ 親' : '親'}
                        </button>
                    </div>
                    
                    <div class="toggle-grid">
                        <div class="toggle-item">
                            <span class="toggle-label">副露</span>
                            <button class="btn-toggle ${player.furo > 0 ? 'active' : ''}" onclick="toggleFuro(${player.id})">
                                ${player.furo > 0 ? '✓ ON' : 'OFF'}
                            </button>
                        </div>
                        <div class="toggle-item">
                            <span class="toggle-label">リーチ</span>
                            <button class="btn-toggle ${player.reach > 0 ? 'active' : ''} ${reachDisabled ? 'disabled' : ''}" onclick="toggleReach(${player.id})">
                                ${player.reach > 0 ? '✓ ON' : reachDisabled ? '—' : 'OFF'}
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // カウンター更新
        function updateCounter(playerId, type, change) {
            const player = players[playerId];
            player[type] = Math.max(0, player[type] + change); // 負の数にならないように
            renderPlayers();
        }
        
        // プレイヤー名編集
        function editPlayerName(playerId) {
            const player = players[playerId];
            const nameElement = document.getElementById(`playerName${playerId}`);
            
            const input = document.createElement('input');
            input.type = 'text';
            input.value = player.name;
            input.className = 'player-name-input';
            
            input.onblur = function() {
                const newName = input.value.trim() || player.position;
                player.name = newName;
                savePlayerNames();
                renderPlayers();
            };
            
            input.onkeypress = function(e) {
                if (e.key === 'Enter') {
                    input.blur();
                }
            };
            
            nameElement.replaceWith(input);
            input.focus();
            input.select();
        }
        
        // 和了モーダルを開く
        function openAgariModal(playerId) {
            currentAgariPlayer = playerId;
            const modal = document.getElementById('agariModal');
            const agariPlayerSelect = document.getElementById('agariPlayer');
            const ronFromSelect = document.getElementById('ronFrom');
            
            // プレイヤー選択肢を生成
            agariPlayerSelect.innerHTML = players.map(p => 
                `<option value="${p.id}" ${p.id === playerId ? 'selected' : ''}>${p.name}</option>`
            ).join('');
            
            // ロン相手の選択肢を生成（和了者以外）
            updateRonFromOptions();
            
            // フォームリセット
            document.getElementById('agariForm').reset();
            document.getElementById('ronFromGroup').style.display = 'none';
            document.getElementById('ippatsuLabel').classList.remove('checked');
            
            // ラジオボタンの初期selected状態
            updateRadioStyles();
            
            modal.style.display = 'block';
        }
        
        // ラジオボタンのスタイルをJS制御で更新（Safari対応）
        function updateRadioStyles() {
            document.querySelectorAll('.radio-label').forEach(label => {
                const radio = label.querySelector('input[type="radio"]');
                if (radio && radio.checked) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });
        }
        
        // ロン相手の選択肢を更新
        function updateRonFromOptions() {
            const agariPlayerId = parseInt(document.getElementById('agariPlayer').value);
            const ronFromSelect = document.getElementById('ronFrom');
            ronFromSelect.innerHTML = players
                .filter(p => p.id !== agariPlayerId)
                .map(p => `<option value="${p.id}">${p.name}</option>`)
                .join('');
        }
        
        // 共通和了モーダルを開く
        function openAgariModalCommon() {
            const modal = document.getElementById('agariModal');
            const agariPlayerSelect = document.getElementById('agariPlayer');
            const ronFromSelect = document.getElementById('ronFrom');
            
            // プレイヤー選択肢を生成
            agariPlayerSelect.innerHTML = players.map(p => 
                `<option value="${p.id}">${p.name}</option>`
            ).join('');
            
            // ロン相手の選択肢を生成
            updateRonFromOptions();
            
            // フォームリセット
            document.getElementById('agariForm').reset();
            document.getElementById('ronFromGroup').style.display = 'none';
            document.getElementById('ippatsuLabel').classList.remove('checked');
            
            // ラジオボタンの初期selected状態
            updateRadioStyles();
            
            modal.style.display = 'block';
        }
        
        // 和了モーダルを閉じる
        function closeAgariModal() {
            document.getElementById('agariModal').style.display = 'none';
            currentAgariPlayer = null;
        }
        
        // 和了記録フォーム送信
        document.addEventListener('DOMContentLoaded', function() {
            // ラジオボタン変更時の処理
            document.querySelectorAll('input[name="agariType"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const ronFromGroup = document.getElementById('ronFromGroup');
                    ronFromGroup.style.display = this.value === 'ron' ? 'block' : 'none';
                    updateRadioStyles();
                });
            });
            
            // 和了者変更時の処理
            document.getElementById('agariPlayer').addEventListener('change', updateRonFromOptions);
            
            document.getElementById('agariForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const agariPlayerId = parseInt(document.getElementById('agariPlayer').value);
                const agariType = document.querySelector('input[name="agariType"]:checked').value;
                const points = parseInt(document.getElementById('agariPoints').value);
                const ronFromId = agariType === 'ron' ? parseInt(document.getElementById('ronFrom').value) : null;
                const isIppatsu = document.getElementById('ippatsuCheck').checked;
                
                const player = players[agariPlayerId];
                player.agari = 1;
                player.totalPoints += points;
                
                if (agariType === 'tsumo') {
                    player.tsumoCount++;
                } else {
                    player.ronCount++;
                    players[ronFromId].houjuu = 1;
                    players[ronFromId].totalHoujuu = (players[ronFromId].totalHoujuu || 0) + 1;
                }
                
                // 和了詳細を記録
                player.agariDetails.push({
                    type: agariType,
                    points: points,
                    from: ronFromId !== null ? players[ronFromId].name : null,
                    ippatsu: isIppatsu,
                    timestamp: new Date().toLocaleString('ja-JP')
                });
                
                closeAgariModal();
                renderPlayers();
            });
        });
        
        // 最後の和了を削除
        function removeLastAgari(playerId) {
            const player = players[playerId];
            if (player.agari > 0 && player.agariDetails.length > 0) {
                if (confirm('最後の和了記録を削除しますか？')) {
                    const lastAgari = player.agariDetails.pop();
                    player.agari--;
                    player.totalPoints -= lastAgari.points;
                    
                    if (lastAgari.type === 'tsumo') {
                        player.tsumoCount--;
                    } else {
                        player.ronCount--;
                        // ロン相手の放銃を減らす
                        const ronPlayer = players.find(p => p.name === lastAgari.from);
                        if (ronPlayer) {
                            ronPlayer.houjuu = Math.max(0, ronPlayer.houjuu - 1);
                        }
                    }
                    
                    renderPlayers();
                }
            }
        }
        
        // 副露トグル
        function toggleFuro(playerId) {
            const player = players[playerId];
            if (player.furo > 0) {
                player.furo = 0;
            } else {
                player.furo = 1;
                // 副露をONにしたらリーチを自動的にOFFにする
                player.reach = 0;
            }
            renderPlayers();
        }
        
        // リーチトグル
        function toggleReach(playerId) {
            const player = players[playerId];
            if (player.reach > 0) {
                player.reach = 0;
            } else {
                // リーチをONにする前に副露がONになっていないかチェック
                if (player.furo > 0) {
                    alert('副露している場合はリーチできません');
                    return;
                }
                player.reach = 1;
            }
            renderPlayers();
        }
        
        // 和了トグル
        function toggleAgari(playerId) {
            const player = players[playerId];
            if (player.agari > 0) {
                if (player.agariDetails.length > 0) {
                    const lastAgari = player.agariDetails.pop();
                    player.agari = 0;
                    player.totalPoints -= lastAgari.points;
                    if (lastAgari.type === 'tsumo') {
                        player.tsumoCount--;
                    } else {
                        player.ronCount--;
                        const ronPlayer = players.find(p => p.name === lastAgari.from);
                        if (ronPlayer) {
                            ronPlayer.houjuu = 0;
                            ronPlayer.totalHoujuu = Math.max(0, (ronPlayer.totalHoujuu || 0) - 1);
                        }
                    }
                } else {
                    player.agari = 0;
                }
                renderPlayers();
            } else {
                const alreadyAgari = players.find(p => p.id !== playerId && p.agari > 0);
                if (alreadyAgari) {
                    alert(`${alreadyAgari.name}がすでに和了しています。\n1局で和了できるのは1人だけです。`);
                    return;
                }
                openAgariModal(playerId);
            }
        }
        
        // 放銃トグル
        function toggleHoujuu(playerId) {
            const player = players[playerId];
            player.houjuu = player.houjuu > 0 ? 0 : 1;
            renderPlayers();
        }
        
        // 全リセット
        function resetAll() {
            if (confirm('本当に全てのカウントをリセットしますか？（プレイヤー名は保持されます）')) {
                // 名前を保存
                const savedNames = players.map(p => p.name);
                
                // 初期化
                initPlayers();
                
                // 名前を復元
                players.forEach((p, index) => {
                    p.name = savedNames[index];
                });
                
                renderPlayers();
            }
        }
        
        // データ保存
        function saveData() {
            const timestamp = new Date().toLocaleString('ja-JP');
            const isRyukyoku = players.every(p => p.agari === 0);
            const summary = players.map(p => 
                `${p.name}: 副露${p.furo} リーチ${p.reach} 和了${p.agari} 放銃${p.houjuu}`
            ).join('\n');
            const data = `【麻雀記録 - ${timestamp}】${isRyukyoku ? '【流局】' : ''}\n\n${summary}`;
            
            // 今局のデータのみを保存（累積ではない）
            const savedGames = JSON.parse(localStorage.getItem('mahjongGames') || '[]');
            const gameRecord = {
                timestamp: timestamp,
                isRyukyoku: isRyukyoku,
                kyoku: kyokuLabels[kyoku],
                honba: honba,
                players: players.map(p => ({
                    id: p.id,
                    name: p.name,
                    position: p.position,
                    isOya: p.isOya,
                    furo: p.furo,
                    reach: p.reach,
                    agari: p.agari,
                    houjuu: p.houjuu,
                    agariDetails: p.agari > 0 && p.agariDetails.length > 0 ? [p.agariDetails[p.agariDetails.length - 1]] : [],
                    tsumoCount: p.agari > 0 && p.agariDetails.length > 0 && p.agariDetails[p.agariDetails.length - 1].type === 'tsumo' ? 1 : 0,
                    ronCount: p.agari > 0 && p.agariDetails.length > 0 && p.agariDetails[p.agariDetails.length - 1].type === 'ron' ? 1 : 0,
                    totalPoints: p.agari > 0 && p.agariDetails.length > 0 ? p.agariDetails[p.agariDetails.length - 1].points : 0
                }))
            };
            savedGames.push(gameRecord);
            localStorage.setItem('mahjongGames', JSON.stringify(savedGames));
            
            alert(`記録を保存しました！${isRyukyoku ? '\n\n🌊 流局としてカウントされました' : ''}\n\n` + data);
            
            // 本場数・局の自動更新
            if (isRyukyoku) {
                // 流局 → 本場を増やす、局は進めない
                honba++;
            } else {
                // 和了あり → 親が和了したか確認
                const oyaAgari = players.find(p => p.isOya && p.agari > 0);
                if (oyaAgari) {
                    // 親和了 → 連荘（本場+1、局は進めない）
                    honba++;
                } else {
                    // 子和了 → 局進行（本場リセット、局を進める、親を次に移す）
                    honba = 0;
                    kyoku = (kyoku + 1) % kyokuLabels.length;
                    document.getElementById('kyokuLabel').textContent = kyokuLabels[kyoku];
                    
                    // 親を次のプレイヤーに移動（東→南→西→北→東...）
                    const currentOyaIndex = players.findIndex(p => p.isOya);
                    if (currentOyaIndex !== -1) {
                        players.forEach(p => p.isOya = false);
                        const nextOyaIndex = (currentOyaIndex + 1) % players.length;
                        players[nextOyaIndex].isOya = true;
                    }
                }
            }
            document.getElementById('honbaCount').textContent = honba;
            
            // 保存後、今局フラグのみリセット（名前・累積統計は保持）
            players.forEach(player => {
                player.furo = 0;
                player.reach = 0;
                player.agari = 0;
                player.houjuu = 0;
                // totalHoujuu・agariDetails・totalPoints・tsumoCount・ronCount・nameはそのまま保持
            });
            renderPlayers();
        }
        
        // 画面切り替え
        function showInputScreen() {
            document.getElementById('inputScreen').style.display = 'flex';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('rankingScreen').style.display = 'none';
            document.getElementById('scoreScreen').style.display = 'none';
        }

        function showHistoryScreen() {
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'flex';
            document.getElementById('rankingScreen').style.display = 'none';
            document.getElementById('scoreScreen').style.display = 'none';
            loadHistory();
        }
        
        function showRankingScreen() {
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('rankingScreen').style.display = 'flex';
            document.getElementById('scoreScreen').style.display = 'none';
            loadRanking();
        }
        
        function showScoreScreen() {
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('rankingScreen').style.display = 'none';
            document.getElementById('scoreScreen').style.display = 'flex';
            loadScoreManagement();
        }

        // ランキング表示
        function loadRanking() {
            const content = document.getElementById('rankingContent');
            const savedGames = JSON.parse(localStorage.getItem('mahjongGames') || '[]');
            
            if (savedGames.length === 0) {
                content.innerHTML = '<div class="no-history">まだ記録がありません</div>';
                return;
            }
            
            // プレイヤーごとの統計を集計
            const playerStats = {};
            const allPlayerNames = new Set();
            savedGames.forEach(game => game.players.forEach(p => allPlayerNames.add(p.name)));
            allPlayerNames.forEach(name => {
                playerStats[name] = {
                    gamesPlayed: 0,
                    totalAgari: 0,
                    tsumoCount: 0,
                    totalPoints: 0,
                    houjuuGames: 0,
                    furoGames: 0,
                    reachGames: 0
                };
            });
            
            savedGames.forEach(game => {
                game.players.forEach(p => {
                    if (!playerStats[p.name]) return;
                    const st = playerStats[p.name];
                    st.gamesPlayed++;
                    if (p.houjuu > 0) st.houjuuGames++;
                    if (p.furo > 0) st.furoGames++;
                    if (p.reach > 0) st.reachGames++;
                    if (p.agari > 0) {
                        st.totalAgari++;
                        const detail = p.agariDetails && p.agariDetails[0];
                        if (detail) {
                            st.totalPoints += detail.points;
                            if (detail.type === 'tsumo') st.tsumoCount++;
                        }
                    }
                });
            });
            
            // ランキングデータを作成
            const rankings = Object.keys(playerStats).map(name => {
                const stats = playerStats[name];
                return {
                    name: name,
                    gamesPlayed: stats.gamesPlayed,
                    avgPoints: stats.totalAgari > 0 ? Math.round(stats.totalPoints / stats.totalAgari) : 0,
                    totalPoints: stats.totalPoints,
                    agariRate: stats.gamesPlayed > 0 ? ((stats.totalAgari / stats.gamesPlayed) * 100).toFixed(1) : 0,
                    tsumoRate: stats.totalAgari > 0 ? ((stats.tsumoCount / stats.totalAgari) * 100).toFixed(1) : 0,
                    houjuuRate: stats.gamesPlayed > 0 ? ((stats.houjuuGames / stats.gamesPlayed) * 100).toFixed(1) : 0,
                    furoRate: stats.gamesPlayed > 0 ? ((stats.furoGames / stats.gamesPlayed) * 100).toFixed(1) : 0,
                    reachRate: stats.gamesPlayed > 0 ? ((stats.reachGames / stats.gamesPlayed) * 100).toFixed(1) : 0
                };
            });
            
            // テーブルスタイルを追加
            let html = `
                <style>
                    .ranking-table {
                        width: 100%;
                        border-collapse: collapse;
                        background: white;
                        border-radius: 8px;
                        overflow: hidden;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                        font-size: 14px;
                    }
                    .ranking-table th {
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        padding: 12px 6px;
                        text-align: center;
                        font-weight: bold;
                        position: sticky;
                        top: 0;
                        z-index: 10;
                        font-size: 12px;
                    }
                    .ranking-table td {
                        padding: 10px 6px;
                        text-align: center;
                        border-bottom: 1px solid #e0e0e0;
                    }
                    .ranking-table tr:hover {
                        background: #f5f5f5;
                    }
                    .player-name-col {
                        font-weight: bold;
                        color: #333;
                        text-align: left;
                        padding-left: 12px;
                    }
                    .best-value {
                        background: #ffebee;
                        font-weight: bold;
                        color: #c62828;
                    }
                    .worst-value {
                        background: #e3f2fd;
                        font-weight: bold;
                        color: #1565c0;
                    }
                    @media (max-width: 768px) {
                        .ranking-table {

        function calculateStats(scoreData, playerNames) {
            const stats = {
                ranks: {1: [], 2: [], 3: [], 4: []},
                topRate: [], top2Rate: [], avgRank: [], avoid4th: [],
                totalScore: [], scoreDiff: [], maxScore: []
            };
            
            playerNames.forEach((name, pIndex) => {
                let ranks = {1: 0, 2: 0, 3: 0, 4: 0};
                let totalRank = 0, totalScore = 0, maxScore = -Infinity;
                let games = 0;
                
                scoreData.forEach(row => {
                    const pd = row.players[pIndex];
                    if (pd && pd.rank) {
                        ranks[pd.rank]++;
                        totalRank += parseInt(pd.rank);
                        games++;
                    }
                    const score = (parseInt(pd?.plus) || 0) - Math.abs(parseInt(pd?.minus) || 0);
                    totalScore += score;
                    if (score > maxScore) maxScore = score;
                });
                
                stats.ranks[1].push(ranks[1]);
                stats.ranks[2].push(ranks[2]);
                stats.ranks[3].push(ranks[3]);
                stats.ranks[4].push(ranks[4]);
                stats.topRate.push(games > 0 ? ((ranks[1] / games) * 100).toFixed(2) : 0);
                stats.top2Rate.push(games > 0 ? (((ranks[1] + ranks[2]) / games) * 100).toFixed(2) : 0);
                stats.avgRank.push(games > 0 ? (totalRank / games).toFixed(2) : 0);
                stats.avoid4th.push(games > 0 ? (((games - ranks[4]) / games) * 100).toFixed(2) : 0);
                stats.totalScore.push(totalScore);
                stats.maxScore.push({score: maxScore === -Infinity ? 0 : maxScore, isMax: false});
            });
            
            const maxScoreValue = Math.max(...stats.maxScore.map(m => m.score));
            stats.maxScore.forEach(m => { if (m.score === maxScoreValue) m.isMax = true; });
            
            const maxTotal = Math.max(...stats.totalScore);
            stats.scoreDiff = stats.totalScore.map(s => s - maxTotal);
            
            return stats;
        }
        
        function drawScoreChart(scoreData, playerNames) {
            const canvas = document.getElementById('scoreChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            // 保存済みデータを優先使用
            const savedData = JSON.parse(localStorage.getItem('savedScoreData') || 'null');
            const chartData = savedData || scoreData;

            const PAD_TOP = 50, PAD_LEFT = 55, PAD_RIGHT = 20, PAD_BOTTOM = 35;
            const width = canvas.width = canvas.offsetWidth || 340;
            const height = canvas.height = 320;
            ctx.clearRect(0, 0, width, height);
            const plotW = width - PAD_LEFT - PAD_RIGHT;
            const plotH = height - PAD_TOP - PAD_BOTTOM;

            if (!chartData || chartData.length === 0) {
                ctx.fillStyle = '#999';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('データがありません', width / 2, height / 2 - 10);
                ctx.fillText('入力タブでデータを入力し「💾 保存」してください', width / 2, height / 2 + 10);
                return;
            }

            const colors = ['#4285F4', '#EA4335', '#FBBC04', '#34A853'];

            // 累積点数を計算
            const series = playerNames.map(() => [0]);
            chartData.forEach(row => {
                playerNames.forEach((name, pIndex) => {
                    const pd = row.players[pIndex];
                    const score = (parseInt(pd && pd.plus) || 0) - Math.abs(parseInt(pd && pd.minus) || 0);
                    const last = series[pIndex][series[pIndex].length - 1];
                    series[pIndex].push(last + score);
                });
            });

            const allVals = series.flat();
            const rawMax = Math.max(...allVals);
            const rawMin = Math.min(...allVals);
            const pad = Math.max((rawMax - rawMin) * 0.15, 30);
            let yMax = rawMax + pad;
            let yMin = rawMin - pad;

            // Y軸の目盛りをキリの良い数値に
            const yRange = yMax - yMin;
            const step = Math.pow(10, Math.floor(Math.log10(yRange / 5)));
            const niceStep = [1, 2, 5, 10].map(s => s * step).find(s => yRange / s <= 8) || step * 10;
            yMin = Math.floor(yMin / niceStep) * niceStep;
            yMax = Math.ceil(yMax / niceStep) * niceStep;

            const toX = i => PAD_LEFT + (i / (series[0].length - 1)) * plotW;
            const toY = v => PAD_TOP + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

            // 背景白
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width, height);

            // グリッド & Y軸ラベル
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'right';
            for (let v = yMin; v <= yMax + 0.001; v += niceStep) {
                const y = toY(v);
                ctx.beginPath();
                ctx.moveTo(PAD_LEFT, y);
                ctx.lineTo(width - PAD_RIGHT, y);
                ctx.stroke();
                ctx.fillText(v, PAD_LEFT - 5, y + 4);
            }

            // 0ライン（強調）
            if (yMin <= 0 && yMax >= 0) {
                const y0 = toY(0);
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(PAD_LEFT, y0);
                ctx.lineTo(width - PAD_RIGHT, y0);
                ctx.stroke();
            }

            // X軸ラベル（半荘番号）
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i < series[0].length; i++) {
                const x = toX(i);
                ctx.fillText(i, x, height - PAD_BOTTOM + 15);
            }

            // X軸線
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(PAD_LEFT, PAD_TOP + plotH);
            ctx.lineTo(width - PAD_RIGHT, PAD_TOP + plotH);
            ctx.stroke();

            // 折れ線＋ドット描画
            series.forEach((data, pIndex) => {
                const color = colors[pIndex];

                // 折れ線
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.lineJoin = 'round';
                ctx.beginPath();
                data.forEach((val, i) => {
                    const x = toX(i), y = toY(val);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // ドット
                data.forEach((val, i) => {
                    const x = toX(i), y = toY(val);
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            });

            // 凡例（スクリーンショット準拠：上部中央）
            const legendTotalWidth = playerNames.reduce((acc, name) => acc + ctx.measureText(name).width + 28, 0);
            let legendX = (width - legendTotalWidth) / 2;
            const legendY = 18;
            ctx.font = '12px sans-serif';
            playerNames.forEach((name, pIndex) => {
                const color = colors[pIndex];
                // 丸ドット
                ctx.beginPath();
                ctx.arc(legendX + 6, legendY, 6, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                // ラベル
                ctx.fillStyle = '#333';
                ctx.textAlign = 'left';
                ctx.fillText(name, legendX + 16, legendY + 4);
                legendX += ctx.measureText(name).width + 28;
            });
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            if (tabName === 'graph') {
                const savedData = JSON.parse(localStorage.getItem('savedScoreData') || '[]');
                const scoreData = savedData.length > 0 ? savedData : JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
                const playerNames = JSON.parse(localStorage.getItem('mahjongPlayerNames') || '["東家","南家","西家","北家"]');
                setTimeout(() => drawScoreChart(scoreData, playerNames), 100);
            }
        }
        
        // 点数行を追加
        function addScoreRow() {
            const scoreData = JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
            const playerNames = JSON.parse(localStorage.getItem('mahjongPlayerNames') || '["東家","南家","西家","北家"]');
            
            const newRow = {

                round: scoreData.length + 1,
                players: playerNames.map(() => ({plus: '', minus: '', rank: ''}))

        // セルの値を更新
        function updateScoreCell(rowIndex, field, value) {
            const scoreData = JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
            if (scoreData[rowIndex]) {
                scoreData[rowIndex][field] = value;
                localStorage.setItem('mahjongScoreData', JSON.stringify(scoreData));
            }
        }
        
        // 点数に基づいて着順を自動計算（+ が大きい順に1着、合計マイナスが大きい順に4着）
        function autoCalcRanksForRow(row) {
            if (!row || !row.players) return;
            const scores = row.players.map((pd, i) => ({
                index: i,
                total: (parseInt(pd.plus) || 0) - Math.abs(parseInt(pd.minus) || 0)
            }));
            const sorted = [...scores].sort((a, b) => b.total - a.total);
            sorted.forEach((item, rankIdx) => {
                row.players[item.index].rank = rankIdx + 1;
            });
        }

        // プレイヤーセルの値を更新
        function updateScorePlayerCell(rowIndex, playerIndex, field, value) {
            const scoreData = JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
            if (scoreData[rowIndex] && scoreData[rowIndex].players[playerIndex]) {
                scoreData[rowIndex].players[playerIndex][field] = value;
                // rank以外（plusなど）の入力時は着順を自動再計算
                if (field !== 'rank') {
                    autoCalcRanksForRow(scoreData[rowIndex]);
                }
                localStorage.setItem('mahjongScoreData', JSON.stringify(scoreData));

        // 点数管理CSVエクスポート
        function exportScoreCSV() {
            const scoreData = JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
            const playerNames = JSON.parse(localStorage.getItem('mahjongPlayerNames') || '["東家","南家","西家","北家"]');
            if (scoreData.length === 0) { alert('エクスポートするデータがありません。'); return; }

            let csv = '日付,回数';
            playerNames.forEach(name => { csv += `,${name}+,${name}-,${name}合計,${name}着順`; });
            csv += '\n';

            scoreData.forEach(row => {
                csv += `${row.date || ''},${row.round || ''}`;
                playerNames.forEach((name, pIndex) => {
                    const pd = row.players[pIndex] || {};
                    const plus = parseInt(pd.plus) || 0;
                    const minus = Math.abs(parseInt(pd.minus) || 0);
                    const total = plus - minus;
                    csv += `,${plus},${minus > 0 ? -minus : 0},${total},${pd.rank || ''}`;
                });
                csv += '\n';
            });

            // 合計行
            csv += '合計,-';
            playerNames.forEach((name, pIndex) => {
                let totalPlus = 0, totalMinus = 0;
                scoreData.forEach(row => {
                    const pd = row.players[pIndex] || {};
                    totalPlus += parseInt(pd.plus) || 0;
                    totalMinus += Math.abs(parseInt(pd.minus) || 0);
                });
                const total = totalPlus - totalMinus;
                csv += `,${totalPlus},${totalMinus > 0 ? -totalMinus : 0},${total},-`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `麻雀点数管理_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 点数管理CSVインポート
        // ===== CSVインポート：名前不一致時はマッピングUIを表示 =====

        // CSVから読み取ったプレイヤー名リストを一時保存
        var _csvImportState = null;

        function importScoreCSV(event) {
            var file = event.target.files[0];
            if (!file) return;
            event.target.value = '';

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var text = e.target.result;
                    if (text.charCodeAt(0) === 0xFEFF) { text = text.slice(1); }
                    var lines = [];
                    var rawLines = text.split('\n');
                    for (var li = 0; li < rawLines.length; li++) {
                        var trimmed = rawLines[li].replace(/\r$/, '').trim();
                        if (trimmed) lines.push(trimmed);
                    }
                    if (lines.length < 2) { alert('データがありません。'); return; }

                    var headers = lines[0].split(',');

                    // ヘッダーから「+」列を持つプレイヤー名をCSV側として抽出
                    var csvPlayerNames = [];
                    for (var hi = 0; hi < headers.length; hi++) {
                        if (headers[hi].slice(-1) === '+') {
                            csvPlayerNames.push(headers[hi].slice(0, -1));
                        }
                    }
                    if (csvPlayerNames.length === 0) {
                        alert('CSVにプレイヤーデータが見つかりません。ヘッダー形式: 日付,回数,名前+,名前-,...');
                        return;
                    }

                    var appPlayerNames = JSON.parse(localStorage.getItem('mahjongPlayerNames') || '["東家","南家","西家","北家"]');

                    // 完全一致チェック
                    var allMatch = csvPlayerNames.every(function(cn, i) {
                        return appPlayerNames[i] === cn;
                    });

                    // 一時状態を保存してマッピングUIへ
                    _csvImportState = { lines: lines, headers: headers, csvPlayerNames: csvPlayerNames, appPlayerNames: appPlayerNames };

                    if (allMatch) {
                        // 全員一致 → そのままインポート実行
                        var mapping = csvPlayerNames.map(function(cn, i) { return i; });
                        _executeScoreImport(mapping);
                    } else {
                        // 不一致 → マッピングモーダルを表示
                        _showImportMappingModal();
                    }
                } catch (err) {
                    alert('CSVの読み込みに失敗: ' + err.message);
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        // マッピングモーダルを表示
        function _showImportMappingModal() {

            var html = '<div id="importMappingOverlay" style="'
                + 'position:fixed;top:0;left:0;width:100%;height:100%;'

            for (var ai = 0; ai < appNames.length; ai++) {

                }

            html += '<div style="display:flex;gap:8px;margin-top:16px;">'
                + '<button onclick="_cancelImport()" style="flex:1;padding:10px;border:none;border-radius:8px;background:#ddd;font-weight:bold;cursor:pointer;">キャンセル</button>'
                + '<button onclick="_confirmImport()" style="flex:1;padding:10px;border:none;border-radius:8px;background:#9C27B0;color:#fff;font-weight:bold;cursor:pointer;">取り込む</button>'

        function _cancelImport() {
            var el = document.getElementById('importMappingOverlay');
            if (el) el.remove();
            _csvImportState = null;
        }

        function _confirmImport() {
            var state = _csvImportState;
            if (!state) return;
            var mapping = [];
            for (var ai = 0; ai < state.appPlayerNames.length; ai++) {
                var sel = document.getElementById('csvMapping_' + ai);
                mapping.push(sel ? parseInt(sel.value) : -1);
            }
            var el = document.getElementById('importMappingOverlay');
            if (el) el.remove();
            _executeScoreImport(mapping);
        }

        // mapping[appIndex] = csvPlayerIndex（-1は対応なし）
        function _executeScoreImport(mapping) {
            var state = _csvImportState;
            var lines = state.lines;
            var headers = state.headers;
            var csvNames = state.csvPlayerNames;
            var appNames = state.appPlayerNames;

            // CSV列インデックス取得ヘルパー
            function colIdx(csvPlayerIdx, suffix) {
                if (csvPlayerIdx < 0) return -1;
                return headers.indexOf(csvNames[csvPlayerIdx] + suffix);
            }

            var newData = [];
            for (var i = 1; i < lines.length; i++) {
                var cols = lines[i].split(',');
                if (cols[0] === '合計') continue;
                if (!cols[0] && !cols[1]) continue;
                var row = {
                    date:  cols[0] || '',
                    round: cols[1] || i,
                    players: appNames.map(function(name, ai) {
                        var ci = mapping[ai];
                        var pIdx = colIdx(ci, '+');
                        var mIdx = colIdx(ci, '-');
                        var plus     = pIdx >= 0 ? (parseInt(cols[pIdx]) || 0) : 0;
                        var minusRaw = mIdx >= 0 ? (parseInt(cols[mIdx]) || 0) : 0;
                        return {
                            plus:  plus !== 0 ? plus : '',
                            minus: Math.abs(minusRaw) !== 0 ? Math.abs(minusRaw) : '',
                            rank:  ''
                        };
                    })
                };
                autoCalcRanksForRow(row);
                newData.push(row);
            }

            _csvImportState = null;

            if (newData.length === 0) { alert('読み込めるデータがありませんでした。'); return; }

            var choice = confirm(newData.length + '行読み込み。OK=追記 / キャンセル=置き換え');
            if (choice) {
                var existing = JSON.parse(localStorage.getItem('mahjongScoreData') || '[]');
                localStorage.setItem('mahjongScoreData', JSON.stringify(existing.concat(newData)));
            } else {
                localStorage.setItem('mahjongScoreData', JSON.stringify(newData));
            }
            loadScoreManagement();
            alert(newData.length + '行のデータを読み込みました（着順は自動計算済み）');
        }

        }
        
        // 全履歴を削除
        function clearAllHistory() {
            if (confirm('本当に全ての記録を削除しますか？この操作は取り消せません。')) {
                localStorage.removeItem('mahjongGames');
                loadHistory();
            }
        }
        
        // CSVエクスポート
        function exportCSV() {
            const savedGames = JSON.parse(localStorage.getItem('mahjongGames') || '[]');
            if (savedGames.length === 0) {
                alert('エクスポートするデータがありません。');
                return;
            }
            
            // ヘッダー行
            const headers = ['日時', '流局', 'プレイヤー', '家', '副露', 'リーチ', '和了', '和了方法', '一発', '得点', '放銃', '放銃相手'];
            const rows = [headers];
            
            savedGames.forEach(game => {
                game.players.forEach(p => {
                    const detail = p.agariDetails && p.agariDetails[0];
                    rows.push([
                        game.timestamp,
                        game.isRyukyoku ? '流局' : '',
                        p.name,
                        p.position,
                        p.furo > 0 ? '○' : '',
                        p.reach > 0 ? '○' : '',
                        p.agari > 0 ? '○' : '',
                        detail ? (detail.type === 'tsumo' ? 'ツモ' : 'ロン') : '',
                        detail && detail.ippatsu ? '○' : '',
                        detail ? detail.points : '',
                        p.houjuu > 0 ? '○' : '',
                        detail && detail.type === 'ron' && detail.from ? detail.from : ''
                    ]);
                });
            });
            
            // BOM付きUTF-8でCSV生成（Excelで文字化けしないように）
            const csvContent = '\uFEFF' + rows.map(row => 
                row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
            ).join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `mahjong_${new Date().toLocaleDateString('ja-JP').replace(/\//g, '')}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        // CSVインポート
        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    // BOMを削除
                    const cleanText = text.replace(/^\uFEFF/, '');
                    const lines = cleanText.split('\n').filter(line => line.trim());
                    
                    if (lines.length < 2) {
                        alert('CSVファイルが空です。');
                        return;
                    }
                    
                    // ヘッダー行をスキップ
                    const dataLines = lines.slice(1);
                    
                    // 日時ごとにグループ化
                    const gamesByTimestamp = {};
                    dataLines.forEach(line => {
                        // CSVパース（ダブルクォートで囲まれたフィールドに対応）
                        const fields = [];
                        let current = '';
                        let inQuotes = false;
                        
                        for (let i = 0; i < line.length; i++) {
                            const char = line[i];
                            if (char === '"') {
                                if (inQuotes && line[i + 1] === '"') {
                                    current += '"';
                                    i++;
                                } else {
                                    inQuotes = !inQuotes;
                                }
                            } else if (char === ',' && !inQuotes) {
                                fields.push(current);
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        fields.push(current);
                        
                        if (fields.length < 14) return; // 不完全な行はスキップ
                        
                        const [timestamp, isRyukyoku, playerName, position, furo, reach, agari, agariType, ippatsu, dora, uraDora, points, houjuu, ronFrom] = fields;
                        
                        if (!gamesByTimestamp[timestamp]) {
                            gamesByTimestamp[timestamp] = {
                                timestamp: timestamp,
                                isRyukyoku: isRyukyoku === '流局',
                                kyoku: '',
                                honba: 0,
                                players: []
                            };
                        }
                        
                        const playerData = {
                            name: playerName,
                            position: position,
                            furo: furo === '○' ? 1 : 0,
                            reach: reach === '○' ? 1 : 0,
                            agari: agari === '○' ? 1 : 0,
                            houjuu: houjuu === '○' ? 1 : 0,
                            totalPoints: points ? parseInt(points) : 0,
                            agariDetails: [],
                            isOya: false
                        };
                        
                        // 和了詳細を追加
                        if (agari === '○' && agariType) {
                            playerData.agariDetails.push({
                                type: agariType === 'ツモ' ? 'tsumo' : 'ron',
                                points: points ? parseInt(points) : 0,
                                from: ronFrom || null,
                                ippatsu: ippatsu === '○',
                                dora: dora ? parseInt(dora) : 0,
                                uraDora: uraDora ? parseInt(uraDora) : 0,
                                timestamp: timestamp
                            });
                        }
                        
                        gamesByTimestamp[timestamp].players.push(playerData);
                    });
                    
                    // 既存の履歴を取得
                    const savedGames = JSON.parse(localStorage.getItem('mahjongGames') || '[]');
                    
                    // 新しいゲームを追加
                    const newGames = Object.values(gamesByTimestamp);
                    const mergedGames = [...savedGames, ...newGames];
                    
                    // 保存
                    localStorage.setItem('mahjongGames', JSON.stringify(mergedGames));
                    
                    alert(`${newGames.length}局のデータをインポートしました。`);
                    loadHistory();
                    
                } catch (error) {
                    console.error('CSV読み込みエラー:', error);
                    alert('CSVファイルの読み込みに失敗しました。形式を確認してください。');
                }
            };
            
            reader.readAsText(file, 'UTF-8');
            
            // ファイル選択をリセット（同じファイルを再度選択できるように）
            event.target.value = '';
        }
        
        // モーダルの外側をクリックで閉じる（和了モーダルのみ）
        window.onclick = function(event) {
            const agariModal = document.getElementById('agariModal');
            if (event.target == agariModal) {
                closeAgariModal();
            }
        }
        
        // ページ読み込み時に初期化
        initPlayers();
    </script>
</body>
